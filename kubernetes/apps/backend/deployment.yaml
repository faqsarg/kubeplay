apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: <ECR_REPO_URL>:<SHA>   # placeholder — replaced at deploy time
          ports:
            - containerPort: 8080
          env:
            # 1. pull the password out of the Secret into an env var
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            # 2. compose the DSN, injecting $(DB_PASSWORD) defined above.
            - name: DATABASE_URL
              value: "postgres://kubeplay:$(DB_PASSWORD)@postgres-postgresql:5432/kubeplay?sslmode=disable"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
