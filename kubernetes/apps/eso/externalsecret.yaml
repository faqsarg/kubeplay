# The "recipe": tells ESO to pull the AWS secret and materialize it as a native
# K8s Secret named postgres-credentials, in the same namespace as its consumers.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
  data:
    - secretKey: password              # consumed by the "kubeplay" user AND the backend's DATABASE_URL
      remoteRef:
        key: kubeplay/staging/postgres
        property: password
    - secretKey: postgres-password     # the "postgres" superuser (chart-internal only)
      remoteRef:
        key: kubeplay/staging/postgres
        property: postgres-password
