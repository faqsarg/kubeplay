# Cluster-scoped: only a connection config (no secret data), so any namespace's
# ExternalSecret can reference it. The actual Secret stays namespaced (least privilege).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets   # required: cluster-scoped store must locate the SA
